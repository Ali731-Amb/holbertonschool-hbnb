<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- AJOUT TASK 1 : header avec logo (requis man review) -->
    <header>
        <nav>
            <img src="assets/logo.png" alt="Application Logo" class="logo">
            <!-- Pas de lien Login sur la page Login -->
        </nav>
    </header>

    <main>
        <form id="login-form">
            <h2>Login</h2>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <!-- AJOUT TASK 2 : message d'erreur (man review : "messages d'erreur appropriés") -->
            <p class="error-message" id="login-error">Invalid email or password. Please try again.</p>

            <button type="submit">Login</button>
        </form>
    </main>

    <!-- AJOUT TASK 1 : footer requis man review -->
    <footer>
        <p>© 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
